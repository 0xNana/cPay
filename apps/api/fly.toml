# Fly.io config for cPay API
# Update `app` to your Fly app name before deploy.

app = "cpay-api"
primary_region = "iad"

[build]

[env]
  PORT = "8787"
  CHAIN_ID = "11155111"
  MAX_PAYMENT_COUNT = "15"
  MAX_FAUCET_CLAIM = "1000000000000"
  PORTO_DEBUG = "false"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
